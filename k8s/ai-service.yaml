apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: codeinsight
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      imagePullSecrets:
        - name: ecr-secret

      containers:
        - name: ai-service
          image: 888635225328.dkr.ecr.us-east-1.amazonaws.com/codeinsight-ai-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 5001

          env:
            - name: DB_HOST
              value: mysql-service

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD

            - name: MODEL_NAME
              value: "openai/gpt-oss-120b"

            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: groq-secret
                  key: GROQ_API_KEY

          readinessProbe:
            httpGet:
              path: /
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: codeinsight
spec:
  selector:
    app: ai-service
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
  type: ClusterIP